serviceCategory: AI and Machine Learning
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Unbabel Translation API
  ServiceCategory: AI and Machine Learning
  ProviderName: Unbabel
  PublisherName: Unbabel
  InvoiceIssuerName: Unbabel
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingCategory: Usage-Based
meters:
- name: words_translated
  description: Words (or characters) translated, the primary billed unit for translation jobs.
  unit: words
  aggregation: sum
  dimensions:
  - account
  - language_pair
  - job_type
- name: human_review
  description: AI-plus-human reviewed translations, typically priced above pure machine translation.
  unit: words
  aggregation: sum
  dimensions:
  - account
  - language_pair
- name: machine_translation
  description: Pure machine-translation (mt_translation) volume, typically lower cost than human-reviewed jobs.
  unit: words
  aggregation: sum
  dimensions:
  - account
  - language_pair
- name: platform_subscription
  description: Fixed platform/subscription fee where applicable, independent of translated volume.
  unit: months
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track translated words per language pair and job type; use the wordcount endpoint to forecast cost before submitting.
- name: Allocation
  description: Tag translation jobs by team, product, or content type so translation spend maps to internal cost centers.
- name: Optimization
  description: Route low-stakes content through mt_translation, reserve AI-plus-human review for high-value content, and reuse translation memory and glossaries to avoid re-translating repeated strings.
- name: Accountability
  description: Assign owners per workload; review monthly translated volume against the committed volume in the Unbabel agreement.
