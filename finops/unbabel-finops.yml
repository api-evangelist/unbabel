description: >-
  FinOps view of Unbabel spend. Unbabel is an enterprise Language Operations
  platform billed on a quote basis: a platform/subscription fee plus per-word (or
  per-character) translation charges that decrease with volume, usually under a
  minimum monthly commitment. The dominant cost driver is translated volume
  (words/characters), influenced by language pair, tone/topic, and whether jobs
  use pure machine translation or AI-plus-human review. There is no public
  self-service rate card; amounts must be reconciled against an Unbabel
  agreement.
notes: >-
  Per-unit rates are not reconciled here; verify with an Unbabel quote. Cost can
  be optimized by using mt_translation for low-stakes content, batching, reusing
  translation memory/glossaries, and calling the wordcount endpoint to forecast
  volume before submission.
