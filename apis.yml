    type: Documentation
  - url: https://developers.unbabel.com/reference/translation-list-update
    type: APIReference
  - url: openapi/unbabel-openapi.yml
    type: OpenAPI
  - url: collections/unbabel.postman_collection.json
    type: PostmanCollection
  - url: collections/unbabel.opencollection.json
    type: OpenCollection
  description: Asynchronously submit text for AI-plus-human translation and manage
    the resulting translation jobs. Create a translation with a source/target
    language pair, tone, topic, and optional callback URL, then list jobs by
    status or retrieve a specific job by uid to read the completed translated
    text, price, and status.
- aid: unbabel:unbabel-machine-translation-api
  name: Unbabel Machine Translation API
  tags:
  - Machine Translation
  - MT
  - AI
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.unbabel.com/docs/introduction
  baseURL: https://api.unbabel.com/tapi/v2
  properties:
  - url: https://developers.unbabel.com/docs/introduction
    type: Documentation
  - url: openapi/unbabel-openapi.yml
    type: OpenAPI
  description: Request pure machine translation (no human review) via the
    mt_translation resource, list MT jobs by status, retrieve a specific MT job by
    uid, and optionally upgrade a machine translation to a full human-reviewed
    translation.
