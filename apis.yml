- aid: unbabel:unbabel-notifications-api
  name: Unbabel Notifications API
  tags:
  - Webhooks
  - Callbacks
  - Notifications
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.unbabel.com/docs/introduction
  baseURL: https://api.unbabel.com/tapi/v2
  properties:
  - url: https://developers.unbabel.com/docs/introduction
    type: Documentation
  - url: openapi/unbabel-openapi.yml
    type: OpenAPI
  description: Because translation is asynchronous, callers can supply a
    callback_url when creating a translation and Unbabel will POST a notification
    to that HTTP endpoint when the job changes status (for example completed).
    This is a server-to-endpoint webhook callback, not a WebSocket; the exact
    payload shape is modeled from the documented callback behavior.
