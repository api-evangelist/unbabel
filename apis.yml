  baseURL: https://api.unbabel.com/tapi/v2
  properties:
  - url: https://developers.unbabel.com/reference/language-pair
    type: APIReference
  - url: openapi/unbabel-openapi.yml
    type: OpenAPI
  description: List the source-to-target language pairs Unbabel can translate,
    optionally filtered by a set of training languages. Used to validate a
    requested language combination before submitting a translation.
- aid: unbabel:unbabel-tone-topic-api
  name: Unbabel Tone and Topic API
