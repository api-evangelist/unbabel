aid: unbabel
url: https://raw.githubusercontent.com/api-evangelist/unbabel/refs/heads/main/apis.yml
name: Unbabel
kind: company
description: Unbabel is a Language Operations (LangOps) platform that combines
  always-on AI translation with on-demand human review to localize customer
  support, marketing, and other business content at scale. Its long-standing
  developer surface is the Unbabel Translation API (tapi/v2, base
  https://api.unbabel.com/tapi/v2), an asynchronous REST API where callers submit
  text with a source/target language pair, tone, and topic, then retrieve the
  completed AI-plus-human translation by uid or via a callback. Unbabel also
  offers a pure machine-translation path (mt_translation) and helper resources
  for language pairs, tones, topics, word count, and account details. Unbabel has
  since launched the standalone LLM-based product Widn.AI (its own RESTful API at
  widn.ai) and, following its combination with TransPerfect, its research and
  models (TowerLLM, COMET, Widn.AI) now also feed the GlobalLink platform; the
  tapi/v2 Translation API remains the documented developer surface at
  developers.unbabel.com.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Translation
- Localization
- Language Operations
- LangOps
- Machine Translation
- Human in the Loop
- AI
